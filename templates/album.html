<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ album.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="viewer-page">
  <header class="viewer-topbar">
    <div class="viewer-topbar-left">
      <a href="/" class="btn">홈</a>
      <strong class="album-title">{{ album.name }}</strong>
    </div>

    <div class="viewer-topbar-controls">
      <label for="intervalInput">간격(초)</label>
      <input id="intervalInput" type="number" min="1" value="3" class="input-small">
      <button id="playBtn" class="btn">자동넘김 시작</button>
      <button id="fullscreenBtn" class="btn">전체화면</button>
    </div>

    <div class="viewer-topbar-right">
      <span id="counter" class="counter"></span>
    </div>
  </header>

  <main class="viewer-main">
    <button class="nav-btn nav-prev" id="prevBtn" aria-label="이전 이미지">‹</button>

    <section class="viewer-stage">
      <img id="mainImage" class="main-image" src="" alt="현재 이미지">
    </section>

    <button class="nav-btn nav-next" id="nextBtn" aria-label="다음 이미지">›</button>
  </main>

  <footer class="viewer-footer">
    <div class="help-text">
      ← / → 이동, 스페이스 자동넘김, F 전체화면
    </div>
  </footer>

  <script>
    window.ALBUM_IMAGES = {{ images | tojson }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
